<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="biji.css">
</head>
<body>
    <form action="Form Pendaftaran Mahasiswa" method="post">
        <h3>---Form Pendaftaran Mahasiswa---</h3>
        <label for="">Nama Lengkap</label>
        <input type="text" name="nama" placeholder="" > 

        <label for="">Nim</label>
        <input type="number" name="Nim" required>
        

        <label for="">Jurusan</label> 
        <select name="" id="Jurusan">
        <option value="Jurusan">Informatika</option>
        <option value="Jurusan">Sistem Informasi</option>
        <option value="Jurusan">KPI</option>
        <option value="Jurusan">Statistika</option>
        </select>

        <label for="">Jenis Kelamin</label>
        <input type="text" name="JK" required>

        <label for="">Alamat</label>
        <input type="text" name="Alamat" required> <br>

        <button type="Submit">KIRIM</button> 

    </form>
</body>
</html>
